<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Crop Suggestions{% endblock %}</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    
        body {
            background-color: #1e1e2f;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
        }
    
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
    
        /* Navbar */
        .navbar {
            background-color: #4a4a6d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
    
        .navbar h1 {
            color: #f1c40f;
            margin: 0;
            font-size: 1.5em;
        }
    
        .nav-button {
            background-color: #4a4a6d;
            color: #f1c40f;
            border: none;
            cursor: pointer;
            font-size: 1em;
            padding: 8px 16px;
            border-radius: 4px;
            position: relative;
        }
    
        .nav-button:hover {
            background-color: #393953;
        }
    
        /* Dropdown */
        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            right: 20px;
            background-color: #2b2b3c;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }
    
        .dropdown a {
            display: block;
            padding: 10px;
            color: #e0e0e0;
            text-decoration: none;
        }
    
        .dropdown a:hover {
            background-color: #4a4a6d;
        }
    
        .show {
            display: block;
        }
    
        h2 {
            color: #f1c40f;
            text-align: center;
            margin-bottom: 20px;
        }
    
        /* Search Form */
        #filterForm {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }
    
        .slider-container {
            display: flex;
            align-items: center;
            width: 60%;
            max-width: 400px;
            position: relative;
            margin-bottom: 20px;
        }
    
        #searchQuery {
            padding: 10px;
            width: 60%;
            max-width: 400px;
            border: none;
            border-radius: 20px; /* Curved corners */
            margin-bottom: 15px;
            background-color: #2b2b3c;
            color: #e0e0e0;
            font-size: 1em;
        }
    
        #searchQuery:focus {
            outline: none;
            box-shadow: 0 0 5px rgba(241, 196, 15, 0.5);
        }

        
        .card {
    padding: 20px; /* Ensure enough padding inside the card */
    background-color: #1e1e2f; /* Card background */
    border-radius: 10px; /* Optional: add rounded corners */
}

.suggestion-form {
    display: flex;
    flex-direction: column; /* Stack inputs vertically */
    align-items: stretch; /* Ensure inputs take full width */
    gap: 15px; /* Space between items */
}

.suggestion-form input[type="text"],
.suggestion-form input[type="number"],
.suggestion-form select,
.submit-button {
    width: 100%; /* Make inputs and button take full width of the form */
    height: 50px; /* Set a fixed height for uniformity */
    padding: 12px; /* Consistent padding */
    background-color: #2b2b3c; /* Input background */
    border: 1px solid #4a4a6d; /* Input border */
    border-radius: 20px; /* Curved corners */
    color: #e0e0e0; /* Text color */
    font-size: 1em; /* Consistent font size */
}

.suggestion-form input[type="text"]:focus,
.suggestion-form input[type="number"]:focus,
.suggestion-form select:focus {
    outline: none;
    box-shadow: 0 0 8px rgba(241, 196, 15, 0.6);
    border-color: #f1c40f;
}

.submit-button {
    background-color: #4a4a6d; /* Button background */
    color: #f1c40f; /* Button text color */
    border: none; /* No border */
    cursor: pointer; /* Pointer cursor on hover */
    transition: background-color 0.3s; /* Smooth transition */
}

.submit-button:hover {
    background-color: #f1c40f; /* Change background on hover */
    color: #1e1e2f; /* Change text color on hover */
}



    
        .submit-button {
            padding: 10px 20px;
            border: none;
            background-color: #4a4a6d;
            color: #f1c40f;
            border-radius: 20px; /* Curved corners */
            cursor: pointer;
            transition: background-color 0.3s;
        }
    
        .submit-button:hover {
            background-color: #393953;
        }
    
        .results {
            margin-top: 20px;
            text-align: center;
        }
    
        .result-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
    
        .result-item {
            background-color: #2b2b3c;
            color: #e0e0e0;
            padding: 10px 20px;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
    
        .result-item:hover {
            transform: translateY(-5px);
        }
    
        .no-suggestions {
            color: #b5b5c4;
        }
    
        /* Table Container */
        .card {
            background-color: #2b2b3c;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
    
        table {
            width: 100%;
            border-collapse: collapse;
        }
    
        thead {
            background-color: #4a4a6d;
        }
    
        thead th {
            padding: 10px;
            color: #f1c40f;
            font-weight: bold;
            text-align: left;
        }
    
        tbody tr {
            transition: background-color 0.3s ease;
        }
    
        tbody tr:hover {
            background-color: #393953;
        }
    
        td {
            padding: 10px;
            border-bottom: 1px solid #4a4a6d;
            text-align: left;
        }
    
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            #filterForm, .slider-container {
                width: 90%;
            }
    
            table, tbody, th, td, tr {
                display: block;
            }
    
            thead {
                display: none;
            }
    
            tbody tr {
                margin-bottom: 20px;
                border-bottom: 2px solid #4a4a6d;
            }
    
            td {
                padding: 8px;
                text-align: right;
                position: relative;
            }
    
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 0;
                width: 50%;
                padding-left: 10px;
                font-weight: bold;
                text-align: left;
                color: #f1c40f;
            }
        }
    </style>
    
    <script>
        function toggleDropdown() {
            const dropdown = document.getElementById("navbarDropdown");
            dropdown.classList.toggle("show");
        }

        window.onclick = function(event) {
            const dropdown = document.getElementById("navbarDropdown");
            if (!event.target.closest('.nav-button') && dropdown.classList.contains("show")) {
                dropdown.classList.remove("show");
            }
        }
    </script>
</head>
<body>

<div class="navbar">
    <h1>Crop Suggestions</h1>
    <div>
        <button class="nav-button" onclick="toggleDropdown()">Menu</button>
        <div class="dropdown" id="navbarDropdown">
            <a href="{% url 'suggest_crops' %}">Suggestion</a>
            <a href="{% url 'historical_data' %}">Historical Data</a>
            <a href="{% url 'crop_trends' %}">Crop Trends</a>
            <a href="{% url 'market_rates' %}">Market Rates</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
