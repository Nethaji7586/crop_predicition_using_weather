<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        /* Basic reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif; /* Modern font */
            background-color: #121212; /* Dark background */
            color: #e0e0e0; /* Light grey text */
        }

        .navbar {
            display: flex; /* Use flexbox for layout */
            justify-content: space-between; /* Space between title and buttons */
            align-items: center; /* Center items vertically */
            background-color: #1e1e2f; /* Darker grey for navbar */
            padding: 15px;
        }

        .navbar h1 {
            color: #f1c40f; /* Bright gold text for title */
            font-size: 24px;
            margin: 0; /* Remove default margin */
        }

        .navbar .nav-button {
            background-color: #3a3a3a; /* Dark button */
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px; /* Rounded corners */
            cursor: pointer;
            margin-left: 10px; /* Space between buttons */
            text-decoration: none; /* Remove underline from links */
            display: inline-block; /* Keep buttons inline */
            transition: background-color 0.3s;
        }

        .navbar .nav-button:hover {
            background-color: #5a5a5a; /* Lighter on hover */
        }

        /* Card styles for form */
        .form-card {
            background-color: #1a1a1a; /* Dark card background */
            border-radius: 10px; /* Rounded corners */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); /* Shadow for depth */
            padding: 20px;
            margin: 20px auto;
            width: 90%; /* Responsive width */
            max-width: 400px; /* Max width */
        }

        /* Input field styles */
        input[type="text"],
        input[type="password"],
        input[type="number"],
        select {
            background-color: #292b2c; /* Darker input background */
            color: #e0e0e0; /* Light text for input */
            border: 1px solid #666; /* Medium border */
            padding: 10px;
            border-radius: 10px; /* Rounded corners */
            margin: 10px 0;
            width: 100%; /* Full width */
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none; /* Remove default outline */
            border-color: #f1c40f; /* Bright gold border on focus */
        }

        button {
            background-color: #3a3a3a; /* Darker button */
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px; /* Rounded corners */
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px; /* Space between button and other elements */
            display: block; /* Make button a block element */
            margin-left: auto; /* Center button */
            margin-right: auto; /* Center button */
        }

        button:hover {
            background-color: #5a5a5a; /* Slightly lighter on hover */
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .navbar h1 {
                font-size: 20px; /* Smaller title on small screens */
            }

            .form-card {
                width: 95%; /* Make form card full width on small screens */
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>Login</h1>
    <div>
        <a href="{% url 'historical_data' %}" class="nav-button">Historical Data</a>
        <a href="{% url 'crop_trends' %}" class="nav-button">Crop Trends</a>
        <a href="{% url 'market_rates' %}" class="nav-button">Market Rates</a>
    </div>
</div>

<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
    <p>Don't have an account? <a href="{% url 'register' %}" style="color: #f1c40f;">Register</a></p>
</div>

</body>
</html>
